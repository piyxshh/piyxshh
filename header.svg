<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="space" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050816"/>
      <stop offset="0.38" stop-color="#120B2E"/>
      <stop offset="0.72" stop-color="#081B2F"/>
      <stop offset="1" stop-color="#04111F"/>
    </linearGradient>
    <linearGradient id="neon" x1="92" y1="326" x2="1188" y2="326" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6F46E5" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#8B5CF6"/>
      <stop offset="0.52" stop-color="#0EA5E9"/>
      <stop offset="0.8" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(284 138) rotate(29) scale(420 230)">
      <stop stop-color="#7C3AED" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(976 122) rotate(145) scale(390 210)">
      <stop stop-color="#0EA5E9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#94A3B8" stroke-opacity="0.08"/>
    </pattern>
    <style>
      @keyframes floatA {
        0%, 100% { transform: translate3d(0, 0, 0); opacity: .55; }
        50% { transform: translate3d(16px, -14px, 0); opacity: .95; }
      }
      @keyframes floatB {
        0%, 100% { transform: translate3d(0, 0, 0); opacity: .5; }
        50% { transform: translate3d(-18px, 12px, 0); opacity: .9; }
      }
      @keyframes pulseLine {
        0%, 100% { stroke-dashoffset: 0; opacity: .65; }
        50% { stroke-dashoffset: -180; opacity: 1; }
      }
      @keyframes scan {
        0% { transform: translateX(-380px); opacity: 0; }
        18%, 72% { opacity: .55; }
        100% { transform: translateX(1260px); opacity: 0; }
      }
      @keyframes blink {
        0%, 46%, 100% { opacity: 1; }
        47%, 82% { opacity: .18; }
      }
      @keyframes shimmer {
        0% { opacity: .15; transform: translateX(-80px); }
        50% { opacity: .55; }
        100% { opacity: .15; transform: translateX(80px); }
      }
      .float-a { animation: floatA 6.5s ease-in-out infinite; transform-origin: center; }
      .float-b { animation: floatB 7.5s ease-in-out infinite; transform-origin: center; }
      .pulse-line { stroke-dasharray: 18 18; animation: pulseLine 7s linear infinite; }
      .scan { animation: scan 5.8s ease-in-out infinite; }
      .blink { animation: blink 1.1s steps(1) infinite; }
      .shimmer { animation: shimmer 4.2s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1280" height="420" rx="34" fill="url(#space)"/>
  <rect width="1280" height="420" rx="34" fill="url(#grid)"/>
  <rect width="1280" height="420" rx="34" fill="url(#violetGlow)"/>
  <rect width="1280" height="420" rx="34" fill="url(#cyanGlow)"/>

  <g class="scan">
    <rect x="0" y="0" width="180" height="420" fill="#FFFFFF" opacity="0.05"/>
  </g>

  <g opacity="0.8">
    <path class="pulse-line" d="M98 318C198 284 307 289 416 307C552 330 633 358 780 340C917 323 1018 277 1183 309" stroke="url(#neon)" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 310C154 282 290 281 430 304C572 328 681 361 816 342C952 323 1075 278 1280 307V420H0V310Z" fill="#070B17" fill-opacity="0.78"/>
  </g>

  <g class="float-a" filter="url(#blur)">
    <circle cx="214" cy="96" r="50" fill="#6F46E5" opacity="0.45"/>
    <circle cx="1045" cy="130" r="58" fill="#0EA5E9" opacity="0.34"/>
  </g>
  <g class="float-b" filter="url(#blur)">
    <circle cx="382" cy="282" r="34" fill="#14B8A6" opacity="0.3"/>
    <circle cx="892" cy="78" r="38" fill="#A78BFA" opacity="0.36"/>
  </g>

  <g opacity="0.72">
    <circle cx="126" cy="80" r="3" fill="#C4B5FD"/>
    <circle cx="198" cy="142" r="3" fill="#67E8F9"/>
    <circle cx="292" cy="88" r="3" fill="#A7F3D0"/>
    <circle cx="1028" cy="76" r="3" fill="#C4B5FD"/>
    <circle cx="1122" cy="146" r="3" fill="#67E8F9"/>
    <circle cx="1168" cy="78" r="3" fill="#A7F3D0"/>
    <path d="M126 80L198 142L292 88" stroke="#CBD5E1" stroke-opacity="0.35"/>
    <path d="M1028 76L1122 146L1168 78" stroke="#CBD5E1" stroke-opacity="0.35"/>
  </g>

  <g filter="url(#shadow)">
    <text x="640" y="132" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="78" font-weight="900">
      Piyush Singh
    </text>
    <text x="640" y="181" text-anchor="middle" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="29" font-weight="800">
      Full Stack AI Product Engineer
    </text>
    <text x="640" y="232" text-anchor="middle" fill="#A78BFA" font-family="JetBrains Mono, Consolas, monospace" font-size="23" font-weight="800" letter-spacing="1.2">
      web + ai + infrastructure + product systems<tspan class="blink">_</tspan>
    </text>
  </g>

  <g transform="translate(342 265)">
    <rect width="596" height="46" rx="23" fill="#020617" fill-opacity="0.64" stroke="#334155"/>
    <text x="298" y="30" text-anchor="middle" fill="#D7E3F5" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="800" letter-spacing="1.1">
      BUILDING AI PRODUCTS THAT FEEL REAL BEFORE THEY FEEL OBVIOUS
    </text>
    <rect class="shimmer" x="130" y="8" width="90" height="30" rx="15" fill="#FFFFFF" opacity="0.1"/>
  </g>

  <g transform="translate(78 344)">
    <rect width="196" height="38" rx="19" fill="#111827" stroke="#334155"/>
    <circle cx="25" cy="19" r="7" fill="#22C55E"/>
    <text x="46" y="24" fill="#CBD5E1" font-family="JetBrains Mono, Consolas, monospace" font-size="14" font-weight="800">OPEN TO BUILD</text>
  </g>
  <g transform="translate(982 344)">
    <rect width="218" height="38" rx="19" fill="#111827" stroke="#334155"/>
    <circle cx="25" cy="19" r="7" fill="#0EA5E9"/>
    <text x="46" y="24" fill="#CBD5E1" font-family="JetBrains Mono, Consolas, monospace" font-size="14" font-weight="800">AGENTIC SYSTEMS</text>
  </g>
</svg>
